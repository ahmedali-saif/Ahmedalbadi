<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>تحديد الموقع - خرائط + GPS - إرسال إلى Google Sheets</title>
    <!-- Leaflet CSS & JS -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        body {
            background: linear-gradient(135deg, #1e3c72 0%, #2a5298 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        .card {
            max-width: 950px;
            width: 100%;
            background: rgba(255,255,255,0.97);
            border-radius: 36px;
            box-shadow: 0 25px 40px rgba(0,0,0,0.25);
            overflow: hidden;
        }
        .header {
            padding: 1.5rem 1.8rem 0.5rem;
            text-align: center;
        }
        h1 {
            font-size: 1.8rem;
            color: #1e3c72;
            margin-bottom: 0.25rem;
        }
        .sub {
            color: #4a627a;
            font-size: 0.9rem;
            margin-bottom: 0.8rem;
            border-bottom: 2px solid #eef2f7;
            display: inline-block;
            padding-bottom: 6px;
        }
        #map {
            height: 420px;
            width: 100%;
            border-top: 1px solid #ddd;
            border-bottom: 1px solid #ddd;
            z-index: 1;
        }
        .info-panel {
            padding: 1.2rem 1.8rem;
            background: #f9fbfd;
        }
        .selected-box {
            background: white;
            border-radius: 28px;
            padding: 14px 20px;
            margin-bottom: 20px;
            border: 1px solid #e2edf7;
            box-shadow: 0 4px 10px rgba(0,0,0,0.02);
        }
        .selected-box p {
            margin: 6px 0;
            font-size: 0.95rem;
            line-height: 1.4;
        }
        .coord {
            font-family: monospace;
            color: #1e5b9e;
            font-weight: bold;
            font-size: 0.9rem;
        }
        .buttons-row {
            display: flex;
            gap: 12px;
            flex-wrap: wrap;
        }
        button {
            flex: 1;
            background: linear-gradient(45deg, #1e3c72, #2a5298);
            color: white;
            border: none;
            padding: 14px 12px;
            font-size: 1rem;
            font-weight: bold;
            border-radius: 50px;
            cursor: pointer;
            transition: all 0.2s ease;
            box-shadow: 0 6px 14px rgba(0,0,0,0.1);
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }
        .btn-gps {
            background: linear-gradient(45deg, #2c5a2e, #1e7e34);
        }
        .btn-gps:hover {
            background: linear-gradient(45deg, #1e4a20, #166b2c);
        }
        button:hover {
            transform: scale(0.98);
            box-shadow: 0 2px 6px rgba(0,0,0,0.1);
        }
        .message {
            margin-top: 1.2rem;
            padding: 12px;
            border-radius: 60px;
            text-align: center;
            font-weight: 500;
            display: none;
            font-size: 0.9rem;
        }
        .success {
            background: #d4edda;
            color: #155724;
            border-right: 4px solid #28a745;
        }
        .error {
            background: #f8d7da;
            color: #721c24;
            border-right: 4px solid #dc3545;
        }
        .loading {
            background: #e9ecef;
            color: #2a5298;
        }
        footer {
            text-align: center;
            font-size: 0.7rem;
            color: #6c86a3;
            padding: 0 1rem 1.2rem;
        }
        @media (max-width: 600px) {
            #map { height: 320px; }
            .info-panel { padding: 1rem; }
            h1 { font-size: 1.5rem; }
            button { font-size: 0.9rem; padding: 12px 8px; }
        }
    </style>
</head>
<body>
<div class="card">
    <div class="header">
        <h1>📍 حدد موقعك على الخريطة</h1>
        <div class="sub">انقر على الخريطة أو استخدم زر الموقع الحالي</div>
    </div>
    <div id="map"></div>
    <div class="info-panel">
        <div class="selected-box">
            <p>🗺️ <strong>العنوان المفصل:</strong> <span id="locationName">لم يتم الاختيار بعد</span></p>
            <p>📌 <strong>الإحداثيات:</strong> <span id="coords" class="coord">-</span></p>
        </div>
        <div class="buttons-row">
            <button id="sendBtn">📤 إرسال إلى Google Sheets</button>
            <button id="gpsBtn" class="btn-gps">📍 موقعي الحالي</button>
        </div>
        <div id="statusMsg" class="message"></div>
    </div>
    <footer>سيتم حفظ العنوان والإحداثيات مع التاريخ والوقت في جدول البيانات</footer>
</div>

<script>
    // رابط Google Apps Script (الخاص بك)
    const GOOGLE_SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbzkqALqPck4xqvJ2i0aV8kOWfwypyzjYpNaO0PzAJcup3_MzuIdLlID2veHvgJIbHlaQw/exec';

    // تهيئة الخريطة
    const map = L.map('map').setView([24.7136, 46.6753], 5);
    L.tileLayer('https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png', {
        attribution: '&copy; <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a> contributors &copy; CartoDB',
        subdomains: 'abcd',
        maxZoom: 19
    }).addTo(map);

    let currentMarker = null;
    let currentLat = null;
    let currentLng = null;
    let currentAddress = '';

    // دالة عكس الإحداثيات (تحويل إلى عنوان نصي)
    async function reverseGeocode(lat, lng) {
        try {
            const response = await fetch(`https://nominatim.openstreetmap.org/reverse?format=json&lat=${lat}&lon=${lng}&zoom=18&addressdetails=1&accept-language=ar`);
            const data = await response.json();
            if (data && data.display_name) {
                const addr = data.address;
                let short = '';
                if (addr.road) short += addr.road;
                if (addr.suburb) short += (short ? '، ' : '') + addr.suburb;
                if (addr.city || addr.town) short += (short ? '، ' : '') + (addr.city || addr.town);
                if (addr.country) short += (short ? '، ' : '') + addr.country;
                return short || data.display_name.split(',')[0];
            }
            return `${lat.toFixed(5)}, ${lng.toFixed(5)}`;
        } catch (error) {
            console.warn("Reverse geocoding error", error);
            return `${lat.toFixed(5)}, ${lng.toFixed(5)}`;
        }
    }

    // دالة لتحديث الخريطة والواجهة بعد الحصول على الإحداثيات
    async function updateMapAndUI(lat, lng) {
        currentLat = lat;
        currentLng = lng;

        // إزالة الماركر القديم وإضافة الجديد
        if (currentMarker) map.removeLayer(currentMarker);
        currentMarker = L.marker([lat, lng]).addTo(map)
            .bindPopup(`📍 الموقع المحدد<br>${lat.toFixed(5)}, ${lng.toFixed(5)}`)
            .openPopup();

        // تحريك الخريطة إلى الموقع الجديد
        map.setView([lat, lng], 14);

        // تحديث واجهة الإحداثيات
        document.getElementById('coords').innerHTML = `${lat.toFixed(6)}°, ${lng.toFixed(6)}°`;
        document.getElementById('locationName').innerHTML = '⏳ جاري جلب العنوان...';

        // جلب العنوان النصي
        const address = await reverseGeocode(lat, lng);
        currentAddress = address;
        document.getElementById('locationName').innerHTML = address;
    }

    // حدث النقر على الخريطة
    map.on('click', async function(e) {
        const { lat, lng } = e.latlng;
        await updateMapAndUI(lat, lng);
    });

    // زر الموقع الحالي
    const gpsBtn = document.getElementById('gpsBtn');
    gpsBtn.addEventListener('click', () => {
        if (!navigator.geolocation) {
            showMessage('⚠️ متصفحك لا يدعم خاصية تحديد الموقع', 'error');
            return;
        }
        showMessage('⏳ جاري تحديد موقعك... يرجى السماح بالوصول إلى الموقع', 'loading');
        navigator.geolocation.getCurrentPosition(
            async (position) => {
                const { latitude, longitude } = position.coords;
                await updateMapAndUI(latitude, longitude);
                showMessage('✅ تم تحديد موقعك الحالي بنجاح', 'success');
            },
            (error) => {
                console.error(error);
                let msg = '❌ فشل تحديد الموقع. ';
                switch(error.code) {
                    case error.PERMISSION_DENIED: msg += 'لقد رفضت إذن الموقع. يرجى السماح في إعدادات المتصفح.'; break;
                    case error.POSITION_UNAVAILABLE: msg += 'معلومات الموقع غير متوفرة.'; break;
                    case error.TIMEOUT: msg += 'انتهى وقت محاولة تحديد الموقع.'; break;
                    default: msg += 'حدث خطأ غير معروف.';
                }
                showMessage(msg, 'error');
            },
            { enableHighAccuracy: true, timeout: 15000, maximumAge: 0 }
        );
    });

    // إرسال البيانات إلى Google Sheets
    const sendBtn = document.getElementById('sendBtn');
    const statusDiv = document.getElementById('statusMsg');

    function showMessage(text, type) {
        statusDiv.style.display = 'block';
        statusDiv.textContent = text;
        statusDiv.className = `message ${type}`;
        setTimeout(() => {
            if (statusDiv.style.display === 'block') statusDiv.style.display = 'none';
        }, 5000);
    }

    async function sendToSheet() {
        if (currentLat === null || currentLng === null) {
            showMessage('⚠️ الرجاء تحديد موقع أولاً (انقر على الخريطة أو استخدم "موقعي الحالي")', 'error');
            return;
        }

        showMessage('⏳ جاري الإرسال إلى Google Sheets...', 'loading');

        const locationText = currentAddress || `${currentLat.toFixed(5)}, ${currentLng.toFixed(5)}`;

        try {
            const formData = new URLSearchParams();
            formData.append('location', locationText);
            formData.append('lat', currentLat);
            formData.append('lng', currentLng);

            const response = await fetch(GOOGLE_SCRIPT_URL, {
                method: 'POST',
                body: formData,
                headers: { 'Content-Type': 'application/x-www-form-urlencoded' }
            });

            if (!response.ok) throw new Error(`HTTP ${response.status}`);
            const result = await response.json();
            if (result.status === 'success') {
                showMessage('✅ تم حفظ الموقع بنجاح في جدول البيانات!', 'success');
            } else {
                throw new Error(result.message || 'خطأ غير معروف من الخادم');
            }
        } catch (error) {
            console.error('Error sending:', error);
            showMessage('❌ فشل الإرسال. تأكد من اتصال الإنترنت وأن الرابط يعمل.', 'error');
        }
    }

    sendBtn.addEventListener('click', sendToSheet);
</script>
</body>
</html>
